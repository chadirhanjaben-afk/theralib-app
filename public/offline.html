<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors ligne – Theralib</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Quicksand', -apple-system, sans-serif;
      background: #F8FAFA;
      color: #1B3C4D;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container { text-align: center; max-width: 400px; }
    .icon {
      width: 80px; height: 80px; margin: 0 auto 1.5rem;
      background: #E8F6F6; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 40px; height: 40px; color: #5AAFAF; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #4A6670; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: #5AAFAF; color: white; border: none;
      padding: 0.75rem 2rem; border-radius: 12px; font-size: 1rem;
      font-weight: 600; cursor: pointer; font-family: inherit;
    }
    button:hover { background: #4A9F9F; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
      </svg>
    </div>
    <h1>Vous êtes hors ligne</h1>
    <p>Vérifiez votre connexion internet puis réessayez.</p>
    <button onclick="window.location.reload()">Réessayer</button>
  </div>
</body>
</html>
